<!DOCTYPE html>
<html>
<head>
    <title>Simple Navigation Bar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar{
            background-color: blue;
        }

        .navbar-brand,
        .nav-link{
            color: white !important;
            font-size: 18px;
        }

        .nav-link:hover{
            color: yellow !important;
        }
    </style>
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand" href="#">My Website</a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showMessage('Home')">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showMessage('About Us')">About Us</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showMessage('Services')">Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showMessage('Contact Us')">Contact Us</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showMessage('Login')">Login</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- JavaScript -->
<script>
function showMessage(page)
{
    alert("You clicked " + page);
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
